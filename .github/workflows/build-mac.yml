name: Build Draft Room (macOS)
on:
  workflow_dispatch:
  push:
    branches: [main]

# Required so the built-in GITHUB_TOKEN can create/upload the release.
permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build, sign, notarize & publish
        env:
          # ── Code signing ──
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # ── Notarization (notarytool) ──
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Publish to GitHub Releases (built-in token) ──
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
      - name: Upload DMG (backup artifact)
        uses: actions/upload-artifact@v4
        with:
          name: DraftRoom-macOS
          path: dist/*.dmg
          retention-days: 5
