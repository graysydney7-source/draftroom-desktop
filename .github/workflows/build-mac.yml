name: Build Draft Room (macOS)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS app (unsigned, universal)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DraftRoom-macOS
          path: dist/*.dmg
          retention-days: 5
